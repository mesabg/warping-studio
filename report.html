<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Warping Studio Report</title>
    <link rel="icon" href="data:," />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="report-page">
    <main class="report-shell">
      <section class="panel stack">
        <div class="panel-heading">
          <div>
            <p class="eyebrow">Session Report</p>
            <h1>Warping Studio Process Report</h1>
          </div>
          <a class="btn subtle" href="/">Back to Workspace</a>
        </div>
        <p class="status-copy" id="reportTimestamp">
          No runtime snapshot found yet. Open this page from the workspace after interacting with the app.
        </p>
      </section>

      <section class="report-grid" id="reportSummary"></section>

      <section class="panel stack">
        <div class="panel-heading">
          <h2>Process Details</h2>
          <span class="mono">Reference</span>
        </div>
        <div class="process-grid" id="processGrid"></div>
      </section>

      <section class="panel stack">
        <div class="panel-heading">
          <h2>Snapshot JSON</h2>
          <span class="mono">Current Session</span>
        </div>
        <pre class="report-json" id="reportJson">{}</pre>
      </section>
    </main>

    <script type="module" src="/report.js"></script>
  </body>
</html>
